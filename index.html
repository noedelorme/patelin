<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <title>Patelin</title>
    <link rel="icon" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="header">
        <!-- <h1>PATELIN</h1> -->

        <div id="option">
            <div class="btn-group">
                <span id="option-region-af" class="btn">AF</span>
                <span id="option-region-am" class="btn">AM</span>
                <span id="option-region-as" class="btn">AS</span>
                <span id="option-region-eu" class="btn active">UE</span>
                <span id="option-region-oc" class="btn">OC</span>
            </div>

            <div class="btn-group">
                <span id="option-difficulty-5" class="btn active">5</span>
                <span id="option-difficulty-10" class="btn">10</span>
                <span id="option-difficulty-25" class="btn">25</span>
                <span id="option-difficulty-50" class="btn">50</span>
                <span id="option-difficulty-all" class="btn">∀</span>
            </div>

            <span id="reset-button" class="button">Réinitialiser</span>
        </div>

        <div class="guess-group">
            <div class="guess">
                <input id="input-country" type="text" placeholder="Proposer un pays...">
                <span class="command">/</span>
            </div>

            <div class="guess">
                <input id="input-capital" type="text" placeholder="Proposer une capitale...">
                <span class="command colon-fix">:</span>
            </div>
        </div>
    </div>

    <div id="list">
        <div class="item"> 
            <img class="flag" src="./flags/france.png" alt="france">
            <span class="country">Islande</span>
            <span class="capital">Reykjavik</span>
        </div>
        <div class="item"> 
            <img class="flag" src="./flags/bulgaria.png" alt="france">
            <span class="country">Norvège</span>
            <span class="capital">Oslo</span>
        </div>
        <div class="item"> 
            <img class="flag" src="./flags/bahrain.png" alt="france">
            <span class="country">Andorre</span>
            <span class="capital">Andorre-la-Vieille</span>
        </div>
        <div class="item"> 
            <img class="flag" src="./flags/kiribati.png" alt="france">
            <span class="country">St.-Vincent-et-les-Grenadines</span>
            <span class="capital">-</span>
        </div>
        <div class="item"> 
            <img class="flag" src="./flags/costa-rica.png" alt="france">
            <span class="country">République centrafricaine</span>
            <span class="capital">Bangui</span>
        </div>
        <div class="item"> 
            <img class="flag" src="./flags/cuba.png" alt="france">
            <span class="country">-</span>
            <span class="capital">-</span>
        </div>
        <div class="item"> 
            <img class="flag" src="./flags/belgium.png" alt="france">
            <span class="country">-</span>
            <span class="capital">-</span>
        </div>
    </div>

    <div id="footer">
        © 2026 Noé Delorme. Tous droits réservés.
    </div>
    
    <script src="world.js"></script>
    <script src="app.js"></script>

</body>
</html>
